<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EcomTool eBay Guide</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 320px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f9fafb;
        color: #111827;
      }
      .wrap { padding: 16px; }
      .badge {
        display: inline-flex;
        font-size: 11px;
        font-weight: 600;
        color: #5842f4;
        background: #eef0ff;
        border: 1px solid #ddd6fe;
        border-radius: 999px;
        padding: 4px 10px;
      }
      h1 {
        font-size: 16px;
        margin: 12px 0 4px;
      }
      p {
        font-size: 13px;
        line-height: 1.45;
        color: #6b7280;
        margin: 0;
      }
      .status {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        background: #fff;
        border: 1px solid #f3f4f6;
      }
      .status.ok { color: #059669; }
      .status.warn { color: #d97706; }
      .btn {
        display: block;
        width: 100%;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
      }
      .btn-primary {
        background: #5842f4;
        color: #fff;
      }
      .btn-secondary {
        background: #fff;
        color: #374151;
        border: 1px solid #e5e7eb;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <span class="badge">EcomTool</span>
      <h1>eBay Guide</h1>
      <p>Connect your EcomTool account, then start a guide from Learn eBay.</p>
      <div id="status" class="status warn">Checking connection…</div>
      <button type="button" id="connectBtn" class="btn btn-primary">Connect with EcomTool</button>
      <button type="button" id="startBtn" class="btn btn-secondary">Start product hunting guide</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
